<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Restaurant Menu UI</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <div class="mobile-container">
        <header>
            <h1>Menu</h1>
            <div class="cart-icon"><i class="fa-solid fa-basket-shopping"></i></div>
        </header>

        <div class="search-container">
            <i class="fa-solid fa-magnifying-glass"></i>
            <input type="text" placeholder="Search">
        </div>

        <div class="categories">
            <span class="active">All</span>
            <span>Breakfast</span>
            <span>Lunch</span>
            <span>Treats</span>
            <span>Dessert</span>
        </div>

        <div class="menu-grid">
            <div class="card">
                <img src="https://images.unsplash.com/photo-1528207776546-365bb710ee93?q=80&w=300" alt="Pear & Orange">
                <div class="card-info">
                    <h3>Pear & Orange</h3>
                    <div class="meta">
                        <span><i class="fa-regular fa-clock"></i> 20 min</span>
                        <span><i class="fa-solid fa-star"></i> 4.8</span>
                    </div>
                    <p class="price">25.00$</p>
                </div>
            </div>

            <div class="card">
                <img src="https://images.unsplash.com/photo-1473093226795-af9932fe5856?q=80&w=300" alt="Meat & Mushrooms">
                <div class="card-info">
                    <h3>Meat & Mushrooms</h3>
                    <div class="meta">
                        <span><i class="fa-regular fa-clock"></i> 30 min</span>
                        <span><i class="fa-solid fa-star"></i> 5.0</span>
                    </div>
                    <p class="price">37.00$</p>
                </div>
            </div>

            <div class="card">
                <img src="https://images.unsplash.com/photo-1525351484163-7529414344d8?q=80&w=300" alt="Egg & Bread">
                <div class="card-info">
                    <h3>Egg & Bread</h3>
                    <div class="meta">
                        <span><i class="fa-regular fa-clock"></i> 15 min</span>
                        <span><i class="fa-solid fa-star"></i> 4.7</span>
                    </div>
                    <p class="price">25.00$</p>
                </div>
            </div>

            <div class="card">
                <img src="https://images.unsplash.com/photo-1551024601-bec78aea704b?q=80&w=300" alt="Sweet pancake">
                <div class="card-info">
                    <h3>Sweet pancake</h3>
                    <div class="meta">
                        <span><i class="fa-regular fa-clock"></i> 10 min</span>
                        <span><i class="fa-solid fa-star"></i> 4.9</span>
                    </div>
                    <p class="price">13.00$</p>
                </div>
            </div>
        </div>

        <nav class="bottom-nav">
            <i class="fa-solid fa-utensils active-nav"></i>
            <i class="fa-regular fa-heart"></i>
            <i class="fa-regular fa-rectangle-list"></i>
            <i class="fa-regular fa-user"></i>
        </nav>
    </div>

</body>
</html>
